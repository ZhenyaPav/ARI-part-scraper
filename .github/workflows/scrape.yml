name: Scrape Parts Catalog

on:
  push:
    branches:
      - main

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: |
          python scraper.py \
            --years 2024 2025 \
            --headless true \
            --concurrency 4 \
            --output data/parts.csv \
            --log-file logs/run.log

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: parts-csv
          path: data/parts.csv
          if-no-files-found: warn
          retention-days: 14

      - name: Upload run log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-log
          path: logs/run.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload error artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-error-artifacts
          path: artifacts/errors/
          if-no-files-found: ignore
          retention-days: 14
